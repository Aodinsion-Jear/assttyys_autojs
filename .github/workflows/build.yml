name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Patch UI - skip GitHub OAuth
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('node_modules/assttyys_ui/dist/index.html', 'utf-8');
          const oldStr = 'nt(async()=>{t.value&&a(),c()});';
          const newStr = 'nt(async()=>{ll.replace(\"/SchemeManagementPage\")});';
          content = content.replace(oldStr, newStr);
          fs.writeFileSync('node_modules/assttyys_ui/dist/index.html', content);
          console.log('UI patched');
          "

      - name: Build
        run: npm run build

      - name: Upload to WebDAV
        run: |
          curl -u "${{ secrets.WEBDAV_USERNAME }}:${{ secrets.WEBDAV_PASSWORD }}" \
            -T assttyys_ng.zip \
            https://webdav.123pan.cn/webdav/assttyys_ng.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: assttyys_ng.zip
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
